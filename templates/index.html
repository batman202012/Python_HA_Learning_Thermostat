<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thermostat Control Node</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation"></script>
    <script>
    let globalQData = [];

    async function loadQData() {
        try {
            const response = await fetch('/api/q_table');
            const result = await response.json();
            globalQData = result.data;
            
            populateDropdowns();
            renderFilteredMatrix(); // Render the initial view
        } catch (error) {
            console.error("Error fetching Q-Table:", error);
        }
    }

    function populateDropdowns() {
        const tempSet = new Set();
        const humidSet = new Set();
        
        globalQData.forEach(row => {
            tempSet.add(row.temp_band);
            humidSet.add(row.humidity_band);
        });

        const tempSelect = document.getElementById('temp-filter');
        const humidSelect = document.getElementById('humid-filter');

        tempSelect.innerHTML = '';
        humidSelect.innerHTML = '';

        // Sort and populate
        Array.from(tempSet).sort().forEach(band => {
            tempSelect.innerHTML += `<option value="${band}">${band}</option>`;
        });
        
        Array.from(humidSet).sort().forEach(band => {
            humidSelect.innerHTML += `<option value="${band}">${band}</option>`;
        });
    }

    function renderFilteredMatrix() {
        const container = document.getElementById('q-matrix-container');
        const selectedTemp = document.getElementById('temp-filter').value;
        const selectedHumid = document.getElementById('humid-filter').value;
        const selectedPeakStr = document.getElementById('peak-filter').value; // "true" or "false"

        // Bulletproof Filter
        const filteredData = globalQData.filter(row => {
            // 1. Force the database value (1/0 or true/false) into a string
            const isRowPeak = (row.is_peak_pricing == 1 || row.is_peak_pricing === true) ? "true" : "false";
            
            // 2. Safely compare everything as strings to avoid hidden spacing or type issues
            return String(row.temp_band) === String(selectedTemp) && 
                String(row.humidity_band) === String(selectedHumid) && 
                isRowPeak === selectedPeakStr;
        });

        if (filteredData.length === 0) {
            container.innerHTML = `<div class="matrix-card" style="text-align: center; padding: 40px; color: #475569;">
                <h3>No Data Yet</h3>
                <p>The AI hasn't explored this specific weather combination yet.</p>
            </div>`;
            return;
        }

        const timeOrder = [
            "Overnight", "Early Morning", "Late Morning", "Mid-Day", 
            "Early Afternoon", "Late Afternoon", "Peak Hours", "Evening", "Late Night"
        ];

        const actionData = {};
        const actionsSet = new Set();

        filteredData.forEach(row => {
            if (!actionData[row.action_taken]) actionData[row.action_taken] = {};
            actionData[row.action_taken][row.time_block] = row.q_score;
            actionsSet.add(row.action_taken);
        });

        const actions = Array.from(actionsSet).sort();

        let html = `
            <div class="matrix-card">
                <h3 class="matrix-title">Showing Brain Data for: ${selectedTemp} | ${selectedHumid}</h3>
                <div class="table-responsive">
                    <table class="q-matrix-table">
                        <thead>
                            <tr>
                                <th>Action \\ Time</th>
                                ${timeOrder.map(time => `<th>${time}</th>`).join('')}
                            </tr>
                        </thead>
                        <tbody>
        `;

        actions.forEach(action => {
            html += `<tr><td class="action-cell"><strong>${action}</strong></td>`;
            
            timeOrder.forEach(time => {
                const score = actionData[action] ? actionData[action][time] : undefined;
                let cellContent = '<span class="empty-cell">-</span>';
                let cellStyle = ''; // We will inject the inline CSS here

                if (score !== undefined) {
                    // Format the number and apply the dynamic heatmap background
                    cellContent = `<strong>${score.toFixed(1)}</strong>`;
                    cellStyle = `style="background-color: ${getHeatmapColor(score)}; color: #ffffff; text-shadow: 0px 1px 2px rgba(0,0,0,0.5);"`;
                }
                
                html += `<td ${cellStyle}>${cellContent}</td>`;
            });
            
            html += `</tr>`;
        });

        html += `</tbody></table></div></div>`;
        container.innerHTML = html;
    }

    function getHeatmapColor(score) {
        if (score > 0) {
            // Green gradient for positive rewards (Scaling from 0 to 10+)
            const intensity = Math.min(score / 10, 1);
            return `rgba(82, 196, 26, ${0.1 + (intensity * 0.7)})`;
        } else if (score < 0) {
            // Red gradient for penalties (Scaling from 0 to -80)
            const intensity = Math.min(Math.abs(score) / 80, 1);
            return `rgba(255, 77, 79, ${0.1 + (intensity * 0.8)})`;
        }
        // Exactly 0.0
        return 'rgba(255, 255, 255, 0.05)';
    }

    async function triggerRestart() {
        if (!confirm("Are you sure you want to restart the AI Node?")) return;

        const statusMsg = document.getElementById('statusMessage');
        statusMsg.innerText = "Restarting... please wait.";
        statusMsg.style.color = "var(--accent)";
        statusMsg.style.display = "block";

        try {
            const response = await fetch('/api/restart', { method: 'POST' });
            if (response.ok) {
                // Wait 5 seconds for the service to come back up, then refresh
                setTimeout(() => {
                    window.location.reload();
                }, 5000);
            }
        } catch (error) {
            console.error("Restart trigger failed", error);
        }
    }

    // Boot up
    loadQData();
    </script>
    <style>
        :root {
            --bg-color: #0f111a;
            --card-bg: #1e2130;
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            --accent: #38bdf8;
            --accent-hover: #0ea5e9;
            --danger: #f43f5e;
            --success: #10b981;
            --border: #334155;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 20px;
        }

        @media (max-width: 800px) {
            .container { grid-template-columns: 1fr; }
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
        }

        h1, h2, h3 { margin-top: 0; }
        h1 { color: var(--accent); margin-bottom: 30px; text-align: center; width: 100%; }
        h2 { font-size: 1.2rem; color: var(--text-muted); border-bottom: 1px solid var(--border); padding-bottom: 10px;}

        /* Form Styles */
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 0.9rem; color: var(--text-muted); }
        input[type="number"], select {
            width: 100%; padding: 10px; border-radius: 4px;
            border: 1px solid var(--border); background-color: var(--bg-color);
            color: var(--text-main); box-sizing: border-box;
        }
        button {
            width: 100%; padding: 12px; border: none; border-radius: 4px;
            background-color: var(--accent); color: #fff; font-weight: bold;
            cursor: pointer; transition: background 0.2s;
        }
        button:hover { background-color: var(--accent-hover); }

        /* Table Styles */
        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.9rem; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid var(--border); }
        th { color: var(--accent); font-weight: 600; background-color: rgba(0,0,0,0.2); }
        tr:hover { background-color: rgba(255,255,255,0.02); }
        
        .score-positive { color: var(--success); font-weight: bold; }
        .score-negative { color: var(--danger); font-weight: bold; }

        .q-controls {
            display: flex;
            gap: 20px;
            background-color: #1e212b;
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            flex-wrap: wrap;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .filter-group label {
            color: #94a3b8;
            font-size: 0.85em;
            font-weight: 600;
            text-transform: uppercase;
        }

        .filter-group select {
            background-color: #15171e;
            color: #e2e8f0;
            border: 1px solid #2d313f;
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 1em;
            cursor: pointer;
            outline: none;
        }

        .filter-group select:focus {
            border-color: #4db8ff;
        }
    </style>
</head>
<body>

    <h1>Thermostat Control Node</h1>

    <div class="container">
        <div class="left-col">
            <div class="card">
                <h2>Manual Override / Schedule</h2>
                <div class="form-group">
                    <label>Target Temperature (°F)</label>
                    <input type="number" id="targetTemp" step="0.5" value="72">
                </div>
                <div class="form-group">
                    <label>Time Block</label>
                    <select id="timeBlock">
                        <option value="Overnight">Overnight (12am-5am)</option>
                        <option value="Early Morning">Early Morning (5am-8am)</option>
                        <option value="Late Morning">Late Morning (8am-10am)</option>
                        <option value="Mid-Day">Mid-Day (10am-12pm)</option>
                        <option value="Early Afternoon">Early Afternoon (12pm-2pm)</option>
                        <option value="Late Afternoon">Late Afternoon (2pm-4pm)</option>
                        <option value="Peak Hours">Peak Hours (4pm-7pm)</option>
                        <option value="Evening">Evening (7pm-10pm)</option>
                        <option value="Late Night">Late Night (10pm-12am)</option>
                    </select>
                </div>
                <button onclick="updateSchedule()">Inject Configuration</button>
                <p id="statusMessage" style="margin-top: 15px; font-size: 0.85rem; color: var(--success); display: none;"></p>
            </div>
            <div class="card" style="margin-top: 20px;">
                <h2>Live System Logs</h2>
                <div id="terminal-viewer" style="background-color: #050505; color: #38bdf8; font-family: monospace; font-size: 0.85em; padding: 15px; height: 500px; overflow-y: auto; border-radius: 6px; white-space: pre-wrap; box-shadow: inset 0 0 10px rgba(0,0,0,0.8); line-height: 1.4;">Awaiting logs...</div>
            </div>
            <button onclick="triggerRestart()" style="background-color: var(--danger); margin-top: 10px;">
                Restart Service
            </button>
        </div>

        <div class="right-col">
            <div class="card" style="margin-bottom: 20px;">
                <h2>Cooling Performance</h2>
                <div style="position: relative; height: 300px; width: 100%;">
                    <canvas id="performanceChart"></canvas>
                </div>
            </div>
            <div class="q-controls">
                <div class="filter-group">
                    <label>🌡️ Temperature Band:</label>
                    <select id="temp-filter" onchange="renderFilteredMatrix()"></select>
                </div>
                <div class="filter-group">
                    <label>💧 Humidity Band:</label>
                    <select id="humid-filter" onchange="renderFilteredMatrix()"></select>
                </div>
                <div class="filter-group">
                    <label>⚡ Pricing:</label>
                    <select id="peak-filter" onchange="renderFilteredMatrix()">
                        <option value="false">Standard Rate</option>
                        <option value="true">🔥 Peak Pricing</option>
                    </select>
                </div>
            </div>

            <div id="q-matrix-container"></div>

            <div class="card">
                <h2>Recent Execution Log</h2>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Timestamp</th>
                                <th>Conditions</th>
                                <th>Action</th>
                                <th>Overrides</th>
                                <th>Net Reward</th>
                            </tr>
                        </thead>
                        <tbody id="historyBody">
                            <tr><td colspan="5">Loading execution history...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Post a manual override to the Python backend
        async function updateSchedule() {
            const temp = document.getElementById('targetTemp').value;
            const block = document.getElementById('timeBlock').value;
            const statusMsg = document.getElementById('statusMessage');

            try {
                // Pointing to the new FastAPI endpoint logic
                const response = await fetch(`/api/schedule?time_block=${block}&target_temp=${temp}`, {
                    method: 'POST'
                });
                
                if (response.ok) {
                    statusMsg.innerText = `Command sent: ${temp}°F for ${block} block.`;
                    statusMsg.style.color = "var(--success)";
                    statusMsg.style.display = "block";
                    setTimeout(() => statusMsg.style.display = "none", 4000);
                } else {
                    throw new Error("API rejected the command.");
                }
            } catch (error) {
                statusMsg.innerText = "Error transmitting configuration.";
                statusMsg.style.color = "var(--danger)";
                statusMsg.style.display = "block";
            }
        }

        let performanceChart = null;

        function updateChart(historyData) {
            const blockColors = {
                "Overnight": "rgba(30, 58, 138, 0.15)",
                "Early Morning": "rgba(59, 130, 246, 0.15)",
                "Late Morning": "rgba(14, 165, 233, 0.15)",
                "Mid-Day": "rgba(234, 179, 8, 0.15)",
                "Early Afternoon": "rgba(249, 115, 22, 0.15)",
                "Late Afternoon": "rgba(239, 68, 68, 0.15)",
                "Peak Hours": "rgba(220, 38, 38, 0.3)",
                "Evening": "rgba(139, 92, 246, 0.15)",
                "Late Night": "rgba(76, 29, 149, 0.15)"
            };

            const ctx = document.getElementById('performanceChart').getContext('2d');
            const chartData = [...historyData].reverse();
            
            // 1. Force the labels into an array so Chart.js stacks them on two lines
            const newStackedLabels = chartData.map(row => {
                const d = new Date(row.date_time);
                const timeString = d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                // This is what the user sees
                return [row.time_block, timeString]; 
            });

            // We create a "hidden" flattened version for the annotation logic to find the coordinates
            const flattenedLabels = newStackedLabels.map(l => l.join(' '));

            const actualTemps = chartData.map(row => row.actual_temp || 0);
            const targetTemps = chartData.map(row => {
                if (row.target_temp !== null && row.target_temp !== undefined) return row.target_temp;
                return row.actual_temp;
            });

            // 2. Generate the background color boxes
            function getBlockByHour(hour) {
                if (hour >= 0 && hour < 5) return "Overnight";
                if (hour >= 5 && hour < 8) return "Early Morning";
                if (hour >= 8 && hour < 10) return "Late Morning";
                if (hour >= 10 && hour < 12) return "Mid-Day";
                if (hour >= 12 && hour < 14) return "Early Afternoon";
                if (hour >= 14 && hour < 16) return "Late Afternoon";
                if (hour >= 16 && hour < 19) return "Peak Hours";
                if (hour >= 19 && hour < 22) return "Evening";
                return "Late Night";
            }

            function generateTimeBlockAnnotations(data) {
                if (!data || data.length === 0) return {};

                const annotations = {};
                let currentBlock = null;
                let startIndex = 0;

                // Get the actual list of labels being used by the chart
                const chartLabels = performanceChart ? performanceChart.data.labels : [];

                data.forEach((row, index) => {
                    const blockName = row.time_block;

                    if (blockName !== currentBlock) {
                        if (currentBlock !== null) {
                            annotations[`block_${index}`] = {
                                type: 'box',
                                // We use the numeric index as the coordinate
                                xMin: startIndex - 0.5, 
                                xMax: index - 0.5,
                                backgroundColor: blockColors[currentBlock] || 'rgba(255,255,255,0.05)',
                                borderWidth: 0,
                                drawTime: 'beforeDraw'
                            };
                        }
                        currentBlock = blockName;
                        startIndex = index;
                    }
                });

                // Final block
                if (currentBlock !== null) {
                    annotations['block_final'] = {
                        type: 'box',
                        xMin: startIndex - 0.5,
                        xMax: data.length - 0.5,
                        backgroundColor: blockColors[currentBlock] || 'rgba(255,255,255,0.05)',
                        borderWidth: 0,
                        drawTime: 'beforeDraw'
                    };
                }
                return annotations;
            }

            const blockAnnotations = generateTimeBlockAnnotations(historyData);

            // 3. Update or Create the Chart
            if (performanceChart) {
                performanceChart.data.labels = newStackedLabels; // Apply clean labels to existing chart
                performanceChart.data.datasets[0].data = actualTemps;
                performanceChart.data.datasets[1].data = targetTemps;
                performanceChart.options.plugins.annotation.annotations = blockAnnotations;
                performanceChart.update();
            } else {
                performanceChart = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: newStackedLabels, // Apply clean labels to new chart
                        datasets: [
                            {
                                label: 'Actual Temp (°F)',
                                data: actualTemps,
                                borderColor: '#f43f5e',
                                backgroundColor: 'rgba(244, 63, 94, 0.1)',
                                borderWidth: 3,
                                tension: 0.4,
                                fill: true
                            },
                            {
                                label: 'Target Temp (°F)',
                                data: targetTemps,
                                borderColor: '#38bdf8',
                                borderDash: [5, 5],
                                borderWidth: 2,
                                tension: 0,
                                fill: false
                            }
                        ]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { labels: { color: '#e2e8f0' } },
                            annotation: { annotations: blockAnnotations }
                        },
                        scales: {
                            x: {
                                type: 'category', // Ensure this is set to category
                                grid: { color: 'rgba(255, 255, 255, 0.1)' },
                                ticks: { color: '#94a3b8', maxRotation: 0, autoSkip: true }
                            },
                            y: {
                                grid: { color: 'rgba(255, 255, 255, 0.1)' },
                                ticks: { color: '#94a3b8' },
                                title: { display: true, text: 'Temperature (°F)', color: '#e2e8f0' }
                            }
                        }
                    }
                });
            }
        }

        // Fetch and render the History Log
        async function fetchHistory() {
            try {
                const response = await fetch('/api/history');
                if (!response.ok) throw new Error("Network response was not ok");
                const json = await response.json();
                const tbody = document.getElementById('historyBody');
                tbody.innerHTML = '';

                if (json.data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" style="color: var(--text-muted);">No logs recorded yet.</td></tr>';
                } else {
                    json.data.forEach(row => {
                        const scoreClass = row.reward_granted >= 0 ? 'score-positive' : 'score-negative';
                        const date = new Date(row.date_time).toLocaleString(undefined, {
                            month: 'short', day: 'numeric', hour: '2-digit', minute:'2-digit'
                        });
                        
                        const tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td>${date}</td>
                            <td>${row.actual_temp}°F / ${row.actual_humidity}%</td>
                            <td>${row.action_taken}</td>
                            <td>${row.user_overrides}</td>
                            <td class="${scoreClass}">${row.reward_granted !== null ? row.reward_granted.toFixed(1) : 'N/A'}</td>
                        `;
                        tbody.appendChild(tr);
                    });
                }

                // --- FIXED: This now runs every time history is fetched! ---
                if (json.data) {
                    updateChart(json.data);
                }

            } catch (error) {
                console.error("Failed to load History", error);
                document.getElementById('historyBody').innerHTML = '<tr><td colspan="5" style="color: var(--danger);">Error loading data. Check terminal.</td></tr>';
            }
        }

        // Fetch the terminal logs
        async function fetchLogs() {
            try {
                const response = await fetch('/api/logs');
                const json = await response.json();
                const viewer = document.getElementById('terminal-viewer');
                
                // Smart Scrolling: Only auto-scroll down if the user is already at the bottom.
                // This prevents the window from jumping if you are scrolling up to read old logs!
                const isScrolledToBottom = viewer.scrollHeight - viewer.clientHeight <= viewer.scrollTop + 10;
                
                viewer.textContent = json.logs || "System initialized. Awaiting data...";
                
                if (isScrolledToBottom) {
                    viewer.scrollTop = viewer.scrollHeight;
                }
            } catch (error) {
                console.error("Log fetch failed", error);
            }
        }

        // Initialize dashboard
        loadQData();
        fetchHistory();
        fetchLogs(); // Boot up logs

        // Refresh Chart & Matrix every 60 seconds
        setInterval(() => {
            loadQData();
            fetchHistory();
        }, 60000);

        // Refresh Terminal every 5 seconds for live feedback
        setInterval(fetchLogs, 5000);
    </script>
</body>
</html>
