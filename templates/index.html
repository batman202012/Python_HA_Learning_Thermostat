<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thermostat Control Node</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #0f111a;
            --card-bg: #1e2130;
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            --accent: #38bdf8;
            --accent-hover: #0ea5e9;
            --danger: #f43f5e;
            --success: #10b981;
            --border: #334155;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 20px;
        }

        @media (max-width: 800px) {
            .container { grid-template-columns: 1fr; }
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
        }

        h1, h2, h3 { margin-top: 0; }
        h1 { color: var(--accent); margin-bottom: 30px; text-align: center; width: 100%; }
        h2 { font-size: 1.2rem; color: var(--text-muted); border-bottom: 1px solid var(--border); padding-bottom: 10px;}

        /* Form Styles */
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 0.9rem; color: var(--text-muted); }
        input[type="number"], select {
            width: 100%; padding: 10px; border-radius: 4px;
            border: 1px solid var(--border); background-color: var(--bg-color);
            color: var(--text-main); box-sizing: border-box;
        }
        button {
            width: 100%; padding: 12px; border: none; border-radius: 4px;
            background-color: var(--accent); color: #fff; font-weight: bold;
            cursor: pointer; transition: background 0.2s;
        }
        button:hover { background-color: var(--accent-hover); }

        /* Table Styles */
        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.9rem; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid var(--border); }
        th { color: var(--accent); font-weight: 600; background-color: rgba(0,0,0,0.2); }
        tr:hover { background-color: rgba(255,255,255,0.02); }
        
        .score-positive { color: var(--success); font-weight: bold; }
        .score-negative { color: var(--danger); font-weight: bold; }
    </style>
</head>
<body>

    <h1>Thermostat Control Node</h1>

    <div class="container">
        <div class="left-col">
            <div class="card">
                <h2>Manual Override / Schedule</h2>
                <div class="form-group">
                    <label>Target Temperature (°F)</label>
                    <input type="number" id="targetTemp" step="0.5" value="72">
                </div>
                <div class="form-group">
                    <label>Time Block</label>
                    <select id="timeBlock">
                        <option value="Overnight">Overnight (12am-5am)</option>
                        <option value="Early Morning">Early Morning (5am-8am)</option>
                        <option value="Late Morning">Late Morning (8am-10am)</option>
                        <option value="Mid-Day">Mid-Day (10am-12pm)</option>
                        <option value="Early Afternoon">Early Afternoon (12pm-2pm)</option>
                        <option value="Late Afternoon">Late Afternoon (2pm-4pm)</option>
                        <option value="Peak Hours">Peak Hours (4pm-7pm)</option>
                        <option value="Evening">Evening (7pm-10pm)</option>
                        <option value="Late Night">Late Night (10pm-12am)</option>
                    </select>
                </div>
                <button onclick="updateSchedule()">Inject Configuration</button>
                <p id="statusMessage" style="margin-top: 15px; font-size: 0.85rem; color: var(--success); display: none;"></p>
            </div>
        </div>

        <div class="right-col">
            <div class="card" style="margin-bottom: 20px;">
                <h2>Cooling Performance</h2>
                <div style="position: relative; height: 300px; width: 100%;">
                    <canvas id="performanceChart"></canvas>
                </div>
            </div>
            <div class="card" style="margin-bottom: 20px;">
                <h2>Algorithm Q-Table (Learned Behaviors)</h2>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>State (Time/Temp/Humid)</th>
                                <th>Peak Pricing</th>
                                <th>Action Taken</th>
                                <th>Reward Score</th>
                            </tr>
                        </thead>
                        <tbody id="qTableBody">
                            <tr><td colspan="4">Loading matrix data...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="card">
                <h2>Recent Execution Log</h2>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Timestamp</th>
                                <th>Conditions</th>
                                <th>Action</th>
                                <th>Overrides</th>
                                <th>Net Reward</th>
                            </tr>
                        </thead>
                        <tbody id="historyBody">
                            <tr><td colspan="5">Loading execution history...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Post a manual override to the Python backend
        async function updateSchedule() {
            const temp = document.getElementById('targetTemp').value;
            const block = document.getElementById('timeBlock').value;
            const statusMsg = document.getElementById('statusMessage');

            try {
                // Pointing to the new FastAPI endpoint logic
                const response = await fetch(`/api/schedule?time_block=${block}&target_temp=${temp}`, {
                    method: 'POST'
                });
                
                if (response.ok) {
                    statusMsg.innerText = `Command sent: ${temp}°F for ${block} block.`;
                    statusMsg.style.color = "var(--success)";
                    statusMsg.style.display = "block";
                    setTimeout(() => statusMsg.style.display = "none", 4000);
                } else {
                    throw new Error("API rejected the command.");
                }
            } catch (error) {
                statusMsg.innerText = "Error transmitting configuration.";
                statusMsg.style.color = "var(--danger)";
                statusMsg.style.display = "block";
            }
        }

        let performanceChart = null;

        function updateChart(historyData) {
            const ctx = document.getElementById('performanceChart').getContext('2d');
            
            // Reverse the data so the oldest is on the left, newest on the right
            const chartData = [...historyData].reverse();
            
            // Format the timestamp for the X-axis (e.g., "2:00 PM")
            const labels = chartData.map(row => {
                const d = new Date(row.date_time);
                return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            });

            const actualTemps = chartData.map(row => row.actual_temp || 0);
            // Ensure target_temp always has a fallback number so the line doesn't break
            const targetTemps = chartData.map(row => {
                if (row.target_temp !== null && row.target_temp !== undefined) {
                    return row.target_temp;
                }
                return row.actual_temp; // Fallback to actual if target is missing
            });

            if (performanceChart) {
                // If chart exists, just update the data
                performanceChart.data.labels = labels;
                performanceChart.data.datasets[0].data = actualTemps;
                performanceChart.data.datasets[1].data = targetTemps;
                performanceChart.update();
            } else {
                // Create the chart for the first time
                performanceChart = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [
                            {
                                label: 'Actual Temp (°F)',
                                data: actualTemps,
                                borderColor: '#f43f5e', // Red/Warm
                                backgroundColor: 'rgba(244, 63, 94, 0.1)',
                                borderWidth: 3,
                                tension: 0.4, // Smooth curves
                                fill: true
                            },
                            {
                                label: 'Target Temp (°F)',
                                data: targetTemps,
                                borderColor: '#38bdf8', // Blue/Cool
                                borderDash: [5, 5], // Dashed line for target
                                borderWidth: 2,
                                tension: 0,
                                fill: false
                            }
                        ]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { labels: { color: '#e2e8f0' } }
                        },
                        scales: {
                            x: {
                                grid: { color: 'rgba(255, 255, 255, 0.1)' },
                                ticks: { color: '#94a3b8' }
                            },
                            y: {
                                grid: { color: 'rgba(255, 255, 255, 0.1)' },
                                ticks: { color: '#94a3b8' },
                                title: { display: true, text: 'Temperature (°F)', color: '#e2e8f0' }
                            }
                        }
                    }
                });
            }
        }

        // Fetch and render the Q-Table
        async function fetchQTable() {
            try {
                const response = await fetch('/api/q_table');
                if (!response.ok) throw new Error("Network response was not ok");
                const json = await response.json();
                const tbody = document.getElementById('qTableBody');
                tbody.innerHTML = '';

                if (json.data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4" style="color: var(--text-muted);">Awaiting initial learning cycles...</td></tr>';
                    return;
                }

                json.data.forEach(row => {
                    const scoreClass = row.q_score >= 0 ? 'score-positive' : 'score-negative';
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${row.time_block} | ${row.temp_band} | ${row.humidity_band}</td>
                        <td>${row.is_peak_pricing ? 'Yes' : 'No'}</td>
                        <td>${row.action_taken}</td>
                        <td class="${scoreClass}">${row.q_score.toFixed(1)}</td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch (error) {
                console.error("Failed to load Q-Table", error);
                document.getElementById('qTableBody').innerHTML = '<tr><td colspan="4" style="color: var(--danger);">Error loading data. Check terminal.</td></tr>';
            }
        }

        // Fetch and render the History Log
        async function fetchHistory() {
            try {
                const response = await fetch('/api/history');
                if (!response.ok) throw new Error("Network response was not ok");
                const json = await response.json();
                const tbody = document.getElementById('historyBody');
                tbody.innerHTML = '';

                if (json.data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" style="color: var(--text-muted);">No logs recorded yet.</td></tr>';
                } else {
                    json.data.forEach(row => {
                        const scoreClass = row.reward_granted >= 0 ? 'score-positive' : 'score-negative';
                        const date = new Date(row.date_time).toLocaleString(undefined, {
                            month: 'short', day: 'numeric', hour: '2-digit', minute:'2-digit'
                        });
                        
                        const tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td>${date}</td>
                            <td>${row.actual_temp}°F / ${row.actual_humidity}%</td>
                            <td>${row.action_taken}</td>
                            <td>${row.user_overrides}</td>
                            <td class="${scoreClass}">${row.reward_granted !== null ? row.reward_granted.toFixed(1) : 'N/A'}</td>
                        `;
                        tbody.appendChild(tr);
                    });
                }

                // --- FIXED: This now runs every time history is fetched! ---
                if (json.data) {
                    updateChart(json.data);
                }

            } catch (error) {
                console.error("Failed to load History", error);
                document.getElementById('historyBody').innerHTML = '<tr><td colspan="5" style="color: var(--danger);">Error loading data. Check terminal.</td></tr>';
            }
        }

        // Initialize dashboard and set refresh interval (every 10 seconds for testing)
        fetchQTable();
        fetchHistory();
        setInterval(() => {
            fetchQTable();
            fetchHistory();
        }, 60000);
    </script>
</body>
</html>
